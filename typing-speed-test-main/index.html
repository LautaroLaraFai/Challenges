<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./assets/images/favicon-32x32.png"
		/>
		<link rel="stylesheet" href="./css/header.css" />
		<title>Frontend Mentor | Typing Speed Test</title>
	</head>
	<body>
		<div id="main-container">
			<!-- HEADER -->
			<div id="top-elements">
				<div id="logo">
					<img src="/assets/images/logo-large.svg" alt="logo" />
				</div>
				<div id="pbStatistic">
					<img
						src="/assets/images/icon-personal-best.svg"
						alt="personal best"
					/>
					<span class="dark-text"
						>Personal best:
						<span id="personal-best-display" style="color: hsl(0, 0%, 100%)">
						</span>
					</span>
				</div>
			</div>

			<!-- TOOLBAR -->
			<div id="toolbar">
				<div id="statistics">
					<span class="dark-text"
						>WPM: <span id="wpm-display" style="color: hsl(0, 0%, 100%)"></span>
					</span>
					<span class="dark-text"
						>Accuracy:
						<span id="accuracy-display"></span>
					</span>
					<span class="dark-text"
						>Time: <span id="timeRemain" style="color: hsl(49, 85%, 70%)"></span
					></span>
				</div>
				<div id="toolbar-game-options">
					<div id="difficulty-list">
						<span class="dark-text">Difficulty:</span>
						<input
							type="radio"
							name="difficulty"
							id="Easy"
							value="Easy"
							checked
						/>
						<label for="Easy">Easy</label>
						<input type="radio" name="difficulty" id="Medium" value="Medium" />
						<label for="Medium">Medium</label>
						<input type="radio" name="difficulty" id="Hard" value="Hard" />
						<label for="Hard">Hard</label>
					</div>
					<div id="modeSelector">
						<span class="dark-text">Mode:</span>
						<input type="radio" name="mode" id="timed" value="timed" checked />
						<label for="timed">Timed (60s)</label>
						<input type="radio" name="mode" id="passage" value="passage" />
						<label for="passage">Passage</label>
					</div>
				</div>
			</div>
			<hr />

			<!-- GAME SCREEN -->
			<div id="game-screen">
				<div id="testOutput"></div>
				<div id="not-started-text">
					<button id="start-test">Start Typing Test</button>
					<span>Or press Enter and start typing</span>
				</div>
			</div>

			<!-- MODALS -->
			<div id="completeResults">
				<span id="testSuccessText"></span>
			</div>
			<div id="testFailed">
				<p>You failed :(</p>
				<button onclick="restartGame()">Try again</button>
			</div>

			<footer class="attribution" style="display: none">
				Challenge by
				<a href="https://www.frontendmentor.io?ref=challenge"
					>Frontend Mentor</a
				>
				Coded by <a href="#">Your Name Here</a>
			</footer>
		</div>

		<script>
			// ========== DOM ELEMENTS ==========
			const radios = document.querySelectorAll(
				'input[type="radio"][name="difficulty"]',
			);
			const modeRadios = document.querySelectorAll(
				'input[type="radio"][name="mode"]',
			);
			const allRadios = document.querySelectorAll('input[type="radio"]');
			const gameScreen = document.getElementById("game-screen");
			const divNotStarted = document.querySelector("#not-started-text");
			const testOutput = gameScreen.querySelector("#testOutput");
			const timeUI = document.getElementById("timeRemain");
			const failModal = document.getElementById("testFailed");
			const winModal = document.getElementById("completeResults");
			const testSuccessText = document.querySelector("#testSuccessText");
			const startTestBtn = document.querySelector("#start-test");
			const wpmElement = document.getElementById("wpm-display");
			const accuracyElement = document.getElementById("accuracy-display");
			const pbElement = document.getElementById("personal-best-display");

			// ========== GLOBAL VARIABLES ==========
			let mode = "timed";
			let test = null;
			let timer = null;
			let activeGame = null;
			let startTime = null;
			let timerInterval = null;
			let personalBest = (() => {
				const stored = localStorage.getItem("pb");
				return stored ? parseInt(stored) : -1;
			})();
			renderPB(personalBest);

			// ========== UTILITIES ==========
			function formatTime(seconds) {
				const mins = Math.floor(seconds / 60);
				const secs = seconds % 60;
				return `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
			}

			function restartTimer() {
				if (timer) {
					clearInterval(timer);
					timer = null;
				}
				timeUI.textContent = "";
			}

			// ========== MODAL FUNCTIONS ==========
			function gameOver() {
				if (activeGame) {
					document.removeEventListener("keydown", activeGame);
					activeGame = null;
				}
				failModal.style.display = "flex";
			}

			function setNewPB(newPB) {
				localStorage.setItem("pb", newPB);
				personalBest = newPB;
				renderPB(newPB);
			}

			function renderPB(newPB) {
				pbElement.textContent = newPB >= 0 ? `${newPB} WPM` : "Not set";
			}

			function messageDispatcher(mistakes, currentPosition) {
				const finalWPM = calcWPM(mistakes, currentPosition);
				const isFirstWin = personalBest === -1;
				const statistics = getStatistics();
				console.log(statistics);
				const { accuracyinUI, time } = statistics;
				console.log(accuracyinUI);
				console.log(time);

				const messageStatistic = ` Accuracy: ${accuracyinUI} time: ${time} `;

				if (isFirstWin) {
					setNewPB(finalWPM);
					return `Baseline established! You've set the bar. Now the real challenge begins--Time to beat it ${messageStatistic}`;
				}

				if (finalWPM > personalBest) {
					setNewPB(finalWPM);
					return ` New Personal Best! ${finalWPM} WPM! ${messageStatistic} `;
				}

				return `Test Complete! WPM: ${finalWPM} ${messageStatistic}	`;
			}

			function checkWin(mistakes, currentPosition) {
				clearInterval(timer);
				message = messageDispatcher(mistakes, currentPosition);
				testSuccessText.textContent = message;
				winModal.style.display = "flex";

				setTimeout(() => {
					winModal.style.display = "none";
					restartGame();
				}, 10000);
			}

			function restartGame() {
				if (activeGame) {
					document.removeEventListener("keydown", activeGame);
					activeGame = null;
				}
				restartTimer();
				test = null;
				loadGame();
				divNotStarted.style.display = "flex";
				failModal.style.display = "none";
				wpmElement.textContent = "";
				accuracyElement.textContent = "";
			}

			// ========== TIMER FUNCTIONS ==========
			function startCountdown(seconds) {
				startTime = Date.now();
				if (timer) clearInterval(timer);
				timeUI.textContent = formatTime(seconds);

				timer = setInterval(() => {
					seconds--;
					timeUI.textContent = formatTime(seconds);
					if (seconds === 0) {
						clearInterval(timer);
						timer = null;
						gameOver();
					}
				}, 1000);
			}

			function startStopwatch() {
				startTime = Date.now();
				let seconds = 0;
				if (timer) clearInterval(timer);
				timeUI.textContent = formatTime(seconds);

				timer = setInterval(() => {
					seconds++;
					timeUI.textContent = formatTime(seconds);
				}, 1000);
			}

			function getTranscurredTime() {
				if (!startTime) return 0;
				return Math.floor((Date.now() - startTime) / 1000);
			}

			// ========== GAME DATA ==========
			async function getTest() {
				const difficultyRadio = document.querySelector(
					'input[type="radio"][name="difficulty"]:checked',
				);
				const difficulty = difficultyRadio
					? difficultyRadio.value.toLowerCase()
					: "easy";

				const data = await fetch("/data.json");
				const games = await data.json();
				const gamesFiltered = games[difficulty];
				const randomNumber = Math.floor(Math.random() * gamesFiltered.length);

				return gamesFiltered[randomNumber];
			}

			async function loadGame() {
				if (!test) {
					test = await getTest();
				}
				displayTest(test);
			}

			function displayTest(testToShow) {
				const prettyText = testToShow.text.replace(/^["']|["']$/g, "");
				testOutput.innerHTML = prettyText;
			}

			function calcWPM(mistakes, currentPosition) {
				const transcurredTime = getTranscurredTime();
				const minutes = Math.max(0.1, transcurredTime / 60);
				const correctChars = currentPosition - mistakes.size;
				return Math.round(correctChars / 5 / minutes);
			}

			function calcAccuracy(mistakes, currentPosition) {
				const totalChars = currentPosition;
				const correctChars = currentPosition - mistakes.size;
				const accuracy =
					totalChars === 0
						? 100
						: Math.round((correctChars / totalChars) * 100);
				return accuracy;
			}

			// ========== GAME LOGIC ==========
			function startGame() {
				restartTimer();

				if (activeGame) {
					document.removeEventListener("keydown", activeGame);
				}

				divNotStarted.style.display = "none";

				// Start timer based on mode
				if (mode === "timed") {
					startCountdown(60);
				} else if (mode === "passage") {
					startStopwatch();
				}

				const limit = test.text.length;
				let currentPosition = 0;
				let mistakes = new Set();
				let maxAccuracy = 100;
				let isError = false;

				activeGame = (e) => {
					// Filter special keys
					const WPM = calcWPM(mistakes, currentPosition);
					const specialKeys = ["Shift", "Ctrl", "Alt", "Meta", "CapsLock"];
					if (specialKeys.includes(e.key)) return;

					// Backspace
					if (e.key === "Backspace") {
						if (currentPosition > 0) {
							currentPosition--;
							if (mistakes.has(currentPosition)) {
								mistakes.delete(currentPosition);
							}
						}
						renderGame();
						return;
					}

					// Space or printable character
					const isPrintable = e.key === " " || e.key.length === 1;
					if (!isPrintable) return;

					if (e.key !== test.text[currentPosition]) {
						mistakes.add(currentPosition);
						maxAccuracy = Math.max(0, maxAccuracy - 1);
						isError = true;
					} else {
						isError = false;
					}
					currentPosition++;

					// Win condition
					if (currentPosition === test.text.length && mistakes.size === 0) {
						checkWin(mistakes, currentPosition);
					}

					renderGame();
					renderWPM(mistakes, currentPosition, wpmElement);
					renderAccuracy(maxAccuracy, accuracyElement, isError);
				};

				const renderGame = () => {
					let resultHTML = "";
					for (let i = 0; i < limit; i++) {
						if (mistakes.has(i)) {
							resultHTML += `<span style="color: hsl(354, 63%, 57%); border-bottom: 2px hsl(354, 63%, 57%) solid">${test.text[i]}</span>`;
						} else if (i < currentPosition) {
							resultHTML += `<span style="color: hsl(140, 63%, 57%);">${test.text[i]}</span>`;
						} else if (i === currentPosition) {
							resultHTML += `<span style="color: #FFC107; border-bottom: 2px solid #FFC107; background-color: rgba(255, 193, 7, 0.3);">${test.text[i]}</span>`;
						} else {
							resultHTML += `<span style="color: #9E9E9E">${test.text[i]}</span>`;
						}
					}
					testOutput.innerHTML = resultHTML;
				};

				document.addEventListener("keydown", activeGame);
				renderGame();
			}

			function getStatistics() {
				accuracyinUI = accuracyElement.textContent;
				const time = getTranscurredTime();
				console.log(accuracyinUI);
				console.log(time);
				return { accuracyinUI, time };
			}
			function renderWPM(mistakes, currentPosition, wpmElement) {
				const wpm = calcWPM(mistakes, currentPosition);
				if (wpmElement) wpmElement.textContent = wpm;
			}

			function renderAccuracy(maxAccuracy, accuracyElement, isError) {
				if (isError) {
					accuracyElement.style.color = "hsl(354, 63%, 57%)";
				} else {
					accuracyElement.style.color = "hsl(0, 0%, 100%)";
				}
				accuracyElement.textContent = `${maxAccuracy}%`;
			}

			// ========== EVENT LISTENERS ==========
			// Difficulty change
			radios.forEach((radio) => {
				radio.addEventListener("change", async () => {
					test = await getTest();
					loadGame();
				});
			});

			// Mode change
			modeRadios.forEach((radio) => {
				radio.addEventListener("change", () => {
					mode = radio.value;
				});
			});

			// Any radio change (reset UI)
			allRadios.forEach((radio) => {
				radio.addEventListener("change", () => {
					restartTimer();
					divNotStarted.style.display = "flex";
				});
			});

			// Start button
			startTestBtn.addEventListener("click", () => {
				startGame();
			});

			// Enter key to start
			document.addEventListener("keydown", (e) => {
				if (e.key === "Enter") {
					startGame();
				}
			});

			// ========== INITIAL LOAD ==========
			loadGame();
		</script>
	</body>
</html>
